# GPU thermal guard config -- fanless Radeon Pro V620.  (loaded via systemd EnvironmentFile)
# Values are junction/hotspot temperature in Celsius. Edit, then:
#   systemctl restart gpu-thermal-guard
#
#   HOT      = engage cooling (pause the GPU workload) at/above this hotspot temp
#   COOL     = release at/below this (hysteresis)
#   CRIT     = if paused but still climbing, ALSO clock-cap (hard backstop < 110C throttle)
#   INTERVAL = poll seconds
#
# WHY THESE VALUES (must stay in step with gpu-fan-control's SAFETY VALVE at junction>=92C):
#   The chassis-fan valve ramps 30->100% once junction hits 92C. To keep the max-quiet profile
#   actually quiet, the sleeper must hold junction BELOW 92 -- otherwise it duty-cycles 93<->100
#   entirely inside the valve's blast band and the fans stay maxed (the bug we hit at HOT=100/COOL=93).
#
# PRESETS (Tjmax 110C; token-gen inference naturally sits ~85C):
#   quiet       HOT=90  COOL=82   <-- ACTIVE. Junction capped ~90 (< the 92C valve) -> fans ride the
#                                     ~20% quiet curve (~6100 RPM). Sustained GPU work duty-cycles (slower).
#   safety-net  HOT=103 COOL=96             Full throughput at the card's natural ~100C; fans blast; guard near 110C only.
HOT=90
COOL=82
CRIT=104
INTERVAL=1
